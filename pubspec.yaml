name: runsos
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  firebase_database: ^11.0.0
  firebase_messaging: ^15.0.0
  firebase_storage: ^12.0.0

  provider: ^6.1.2
  google_maps_flutter: ^2.6.1
  geolocator: ^12.0.0
  permission_handler: ^11.3.1

  share_plus: ^10.0.0
  url_launcher: ^6.3.0
  image_picker: ^1.1.2
  flutter_local_notifications: ^17.1.2
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
